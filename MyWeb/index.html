<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algeria Map Visualizer</title>

    <!--  AUTH CHECK IN HEAD -->
    <script>
        (function() {
            const user = JSON.parse(localStorage.getItem("user"));
            if (!user) {
                alert("Please login first");
                window.location.replace("login.html");
            }
        })();
    </script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Algeria Map Visualizer</h1>
        <nav>
            <a href="index.html">Explore</a>
            <a href="admin.html">Admin Space</a>
        </nav>
    </header>

    <div id="map-container">
        <div class="top-bar">
            <button onclick="logout()" class="logout-btn">
                Logout
            </button>
        </div>
        <div id="map"></div>
        
        <div class="legend">
            <h4>Legend</h4>
            <div><span style="color:red">●</span> Added Places</div>
            <div><span style="color:blue">●</span> Wilayas (GeoJSON)</div>
        </div>

        
        <div class="geojson-controls">
            <label>
                Load GeoJSON: 
                <input type="file" id="geojson-input" accept=".geojson,.json">
            </label>
            <label>
                Opacity: 
                <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="0.7">
            </label>
        </div>
    </div>
    <button id="sos-btn">SOS</button>
    
    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/config.js"></script>
    <script src="js/map-init.js"></script>
    <script src="js/user.js"></script>

    <script>
        function logout() {
            localStorage.clear(); // Clears both user and token
            window.location.replace("login.html");
        }
    </script>
</body>
</html>
