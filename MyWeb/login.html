<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GeoViz</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
         background: linear-gradient(135deg, #0f3d2e 0%, #1a7a4c 50%, #27ae60 100%);
    
         height: 100vh;
         display: flex;
         justify-content: center;
         align-items: center;
         padding: 20px;
         }

        /* صندوق تسجيل الدخول */
        .login-container {
            background-color: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
            border-top: 5px solid #27ae60; /* خط أخضر علوي جمالي */
        }

        /* تنسيق الشعار */
        .logo-wrapper {
            margin-bottom: 20px;
        }

        .logo-wrapper img {
            width: 160px;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        h2 {
            color: #1e293b;
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        /* تنسيق الحقول */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            background-color: #f8fafc;
        }

        /* تأثير عند الكتابة داخل الحقل */
        input:focus {
            border-color: #27ae60;
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.2);
            background-color: #fff;
        }

        /* زر الدخول */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #007bff 0%, #0056b3 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* --- التجاوب (Responsiveness) --- */
        
        /* للأجهزة اللوحية والصغيرة */
        @media (max-width: 768px) {
            .login-container {
                padding: 30px 20px;
                max-width: 90%;
            }
            
            h2 { font-size: 1.5rem; }
        }

        /* للهواتف المحمولة */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .login-container {
                padding: 25px 15px;
                border-radius: 15px;
            }

            .logo-wrapper img {
                width: 80px;
            }

            input {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-wrapper">
            <img src="logo.png" alt="App Logo"> 
        </div>

        <h2>Welcome Back</h2>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <button onclick="login()">Login</button>
    </div>

    <script src="./js/login.js"></script>
</body>
</html>
